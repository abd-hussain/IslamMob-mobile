  ios:
    runs-on: self-hosted
    timeout-minutes: 59
    concurrency:
      group: ios-deployment
      cancel-in-progress: true

    steps:
        - name: 📚 Set up git and fetch all history for all branches and tags
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: 🔍 Debug Environment
          run: |
            echo "=== Environment Debug Info ==="
            echo "Current directory: $(pwd)"
            echo "User: $(whoami)"
            echo "Home directory: $HOME"
            echo "PATH: $PATH"
            echo "Xcode path: $(xcode-select -p)"
            echo "Flutter path: $(which flutter)"
            echo "Ruby path: $(which ruby)"
            echo "Ruby version: $(ruby --version)"
            echo "Gem path: $(gem env home)"
            echo "========================"

        - name: 🧪 Check Xcode Version and Tools
          run: |
            echo "=== Xcode Info ==="
            xcodebuild -version
            xcodebuild -showsdks
            xcrun --show-sdk-path
            echo "=================="

        - name: 🐦 Setup Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.32.6'
            channel: 'stable'
            cache: true

        - name: 🔍 Verify Flutter Setup
          run: |
            echo "=== Flutter Info ==="
            flutter doctor -v
            flutter --version
            echo "===================="

        - name: 🗳️ Flutter gen-l10n
          run: flutter gen-l10n

        - name: 🗳️ Flutter Pub Get
          run: flutter pub get
  
        - name: 🗃️ Generate code (Optional)
          run: flutter pub run build_runner build --delete-conflicting-outputs

        - name: 🧰 Set up App Store Connect
          env:
            APPSTORE_CONNECT: ${{ secrets.APPSTORE_CONNECT }}
          run: |
            if [ -n "$APPSTORE_CONNECT" ]; then
              echo "$APPSTORE_CONNECT" | base64 --decode > ios/app_store_connect.json
              echo "App Store Connect file created successfully"
              ls -la ios/app_store_connect.json
            else
              echo "Warning: App Store Connect secret not found. Skipping App Store setup."
            fi

        - name: 🎯 Setup Ruby and Fastlane
          run: |
            echo "=== Ruby Setup ==="
            # Use system Ruby or install specific version
            if command -v rbenv &> /dev/null; then
              echo "Using rbenv Ruby"
              rbenv versions
              rbenv global
            elif command -v rvm &> /dev/null; then
              echo "Using RVM Ruby"
              rvm list
              rvm use default
            else
              echo "Using system Ruby"
            fi
            
            ruby --version
            gem --version
            
            # Fix Ruby permissions if needed
            echo "Fixing Ruby permissions..."
            sudo chown -R $(whoami) /opt/homebrew/lib/ruby/gems/3.4.0/ 2>/dev/null || true
            sudo chmod -R 755 /opt/homebrew/lib/ruby/gems/3.4.0/ 2>/dev/null || true
            
            # Install bundler and fastlane with user gems
            gem install bundler -v 2.5.18 --no-document --user-install
            gem install fastlane --no-document --user-install
            
            # Configure bundler to use user gems
            bundle config set path 'vendor/bundle'
            bundle config set deployment 'false'
            
            echo "Fastlane version: $(fastlane --version)"
            echo "=================="

        - name: 📦 Setup iOS Dependencies
          run: |
            echo "=== iOS Setup ==="
            cd ios
            
            # Clean and setup pods
            echo "Cleaning Podfile.lock..."
            rm -rf Podfile.lock
            rm -rf Pods/
            rm -rf vendor/
            
            # Fix Bundler version mismatch
            echo "Fixing Bundler version..."
            gem uninstall bundler -I -x 2>/dev/null || true
            gem install bundler -v 2.5.18
            
            # Configure bundler
            bundle config set path 'vendor/bundle'
            bundle config set deployment 'false'
            
            # Install gems with specific Bundler version
            echo "Installing gems..."
            bundle _2.5.18_ install
            
            echo "Installing pods..."
            bundle _2.5.18_ exec pod install --repo-update
            
            echo "Pod installation completed"
            cd ..
            echo "=================="

        - name: 🔧 Flutter Clean and Setup
          run: |
            echo "=== Flutter Setup ==="
            flutter clean
            flutter pub get
            echo "===================="

        - name: 🛠️ Build and Deploy iOS
          env:
            MATCH_PASSWORD: ${{ secrets.IOS_MATCH_PASSWORD }}
            MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.GIT_BASIC_AUTHORIZATION }}
            FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
            FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
            FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          run: |
            echo "=== iOS Deployment ==="
            
            # Check required secrets
            if [ -z "$MATCH_PASSWORD" ] || [ -z "$MATCH_GIT_BASIC_AUTHORIZATION" ]; then
              echo "❌ Error: iOS deployment secrets not found!"
              echo "Required secrets:"
              echo "- IOS_MATCH_PASSWORD"
              echo "- GIT_BASIC_AUTHORIZATION"
              exit 1
            fi
            
            # Set additional environment variables for Fastlane
            export MATCH_PASSWORD="$MATCH_PASSWORD"
            export MATCH_GIT_BASIC_AUTHORIZATION="$MATCH_GIT_BASIC_AUTHORIZATION"
            
            if [ -n "$FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD" ]; then
              export FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD="$FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD"
            fi
            
            if [ -n "$FASTLANE_APPLE_ID" ]; then
              export FASTLANE_APPLE_ID="$FASTLANE_APPLE_ID"
            fi
            
            if [ -n "$FASTLANE_TEAM_ID" ]; then
              export FASTLANE_TEAM_ID="$FASTLANE_TEAM_ID"
            fi
            
            echo "Starting iOS deployment..."
            make deploy-ios
            echo "========================"

        - name: 🔍 Debug Build Artifacts
          if: always()
          run: |
            echo "=== Build Artifacts Debug ==="
            echo "Checking build directory..."
            ls -la ios/build/ || echo "Build directory not found"
            
            echo "Checking for IPA file..."
            find ios/build -name "*.ipa" -type f 2>/dev/null || echo "No IPA files found"
            
            echo "Checking for archive..."
            find ios/build -name "*.xcarchive" -type d 2>/dev/null || echo "No archive found"
            echo "============================="

  